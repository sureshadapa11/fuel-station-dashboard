<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fuel Station Dashboard</title>

<style>

body{
font-family:Arial;
background:#EEF1F5;
margin:0;
}

.header{
background:#1F4FA3;
color:white;
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.pump-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.nozzle{
margin-bottom:12px;
}

select,input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin-top:4px;
}

.status{
margin-top:5px;
padding:6px;
color:white;
border-radius:6px;
text-align:center;
font-size:14px;
}

.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}

.reason-box{
display:none;
}

.save-btn{
background:#1F4FA3;
color:white;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
width:260px;
display:block;
margin:20px auto;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">Fuel Station Dashboard</div>

<div class="container" id="dashboard"></div>

<button class="save-btn" onclick="saveData()">SAVE STATUS</button>

<script>

const pumps = [

["Pump 1","Unleaded","Extra Unleaded","Diesel"],
["Pump 2","Unleaded","Extra Unleaded","Diesel"],
["Pump 3","Unleaded","Extra Diesel","Diesel"],
["Pump 4","Unleaded","Extra Diesel","Diesel"],
["Pump 5","Unleaded","Extra Unleaded","Diesel"],
["Pump 6","Unleaded","Extra Unleaded","Diesel"],
["Pump 7","Unleaded","Extra Diesel","Diesel"],
["Pump 8","Unleaded","Extra Diesel","Diesel"]

]

const container=document.getElementById("dashboard")

function render(){

container.innerHTML=""

pumps.forEach((pump,pIndex)=>{

let card=document.createElement("div")
card.className="card"

let html=`<div class="pump-title">${pump[0]}</div>`

pump.slice(1).forEach((nozzle,nIndex)=>{

let id=pIndex+"-"+nIndex

let savedStatus=localStorage.getItem(id) || "Working"
let savedReason=localStorage.getItem(id+"reason") || ""

let color="green"
if(savedStatus=="Not Working") color="orange"
if(savedStatus=="Maintenance") color="red"

let showReason=(savedStatus!="Working") ? "block" : "none"

html+=`

<div class="nozzle">

<b>${nozzle}</b>

<select onchange="statusChanged('${id}',this.value)">
<option ${savedStatus=="Working"?"selected":""}>Working</option>
<option ${savedStatus=="Not Working"?"selected":""}>Not Working</option>
<option ${savedStatus=="Maintenance"?"selected":""}>Maintenance</option>
</select>

<input class="reason-box" id="reason-${id}" style="display:${showReason}" placeholder="Reason" value="${savedReason}">

<div class="status ${color}">${savedStatus}</div>

</div>

`

})

card.innerHTML=html
container.appendChild(card)

})

}

function statusChanged(id,value){

localStorage.setItem(id,value)

let reason=document.getElementById("reason-"+id)

if(value=="Working"){
reason.style.display="none"
}else{
reason.style.display="block"
}

render()

}

function saveData(){

document.querySelectorAll(".reason-box").forEach(input=>{

let id=input.id.replace("reason-","")
localStorage.setItem(id+"reason",input.value)

})

alert("Changes saved successfully!")

}

render()

setInterval(render,5000)

</script>

</body>
</html>
