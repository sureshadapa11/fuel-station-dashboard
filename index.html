<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fuel Station Dashboard</title>

<style>

body{
font-family: Arial;
background:#EEF1F5;
margin:0;
}

.header{
background:#1F4FA3;
color:white;
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.pump-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.nozzle-item{
margin-bottom:15px;
padding:10px;
border-radius:8px;
border-left:5px solid #ccc;
}

.nozzle-item.working{
background:#d4edda;
border-left-color:#28a745;
}

.nozzle-item.not-working{
background:#fff3cd;
border-left-color:#ffc107;
}

.nozzle-item.maintenance{
background:#f8d7da;
border-left-color:#dc3545;
}

.nozzle-name{
font-weight:bold;
margin-bottom:5px;
}

select,input{
width:100%;
padding:6px;
margin-top:3px;
border-radius:4px;
border:1px solid #ccc;
}

.save-btn{
background:#1F4FA3;
color:white;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
width:250px;
display:block;
margin:20px auto;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">Fuel Station Dashboard</div>

<div class="container" id="dashboard"></div>

<button class="save-btn" onclick="saveData()">SAVE STATUS</button>

<script>
const pumps = [
  { name: 'Pump 1', nozzles: ['Unleaded', 'Extra Unleaded', 'Diesel'] },
  { name: 'Pump 2', nozzles: ['Unleaded', 'Extra Unleaded', 'Diesel'] },
  { name: 'Pump 3', nozzles: ['Unleaded', 'Extra Diesel', 'Diesel'] },
  { name: 'Pump 4', nozzles: ['Unleaded', 'Extra Diesel', 'Diesel'] },
  { name: 'Pump 5', nozzles: ['Unleaded', 'Extra Unleaded', 'Diesel'] },
  { name: 'Pump 6', nozzles: ['Unleaded', 'Extra Unleaded', 'Diesel'] },
  { name: 'Pump 7', nozzles: ['Unleaded', 'Extra Diesel', 'Diesel'] },
  { name: 'Pump 8', nozzles: ['Unleaded', 'Extra Diesel', 'Diesel'] }
];

function render() {
  const dashboard = document.getElementById('dashboard');
  dashboard.innerHTML = '';
  pumps.forEach(pump => {
    const pumpDiv = document.createElement('div');
    pumpDiv.className = 'card';
    pumpDiv.innerHTML = `<div class="pump-title">${pump.name}</div>`;
    pump.nozzles.forEach(nozzle => {
      const nozzleDiv = document.createElement('div');
      nozzleDiv.className = 'nozzle-item';
      const status = localStorage.getItem(`${pump.name}-${nozzle}`) || 'Working';
      nozzleDiv.classList.add(status.toLowerCase().replace(' ', '-'));
      nozzleDiv.innerHTML = `
        <div class="nozzle-name">${nozzle}</div>
        <select onchange="statusChanged('${pump.name}', '${nozzle}', this.value)">
          <option value="Working" ${status === 'Working' ? 'selected' : ''}>Working</option>
          <option value="Not Working" ${status === 'Not Working' ? 'selected' : ''}>Not Working</option>
          <option value="Maintenance" ${status === 'Maintenance' ? 'selected' : ''}>Maintenance</option>
        </select>
        <input type="text" placeholder="Reason if not working or maintenance" value="${localStorage.getItem(`${pump.name}-${nozzle}-reason`) || ''}" onchange="saveReason('${pump.name}', '${nozzle}', this.value)" style="display: ${status === 'Working' ? 'none' : 'block'};">
      `;
      pumpDiv.appendChild(nozzleDiv);
    });
    dashboard.appendChild(pumpDiv);
  });
}

function statusChanged(pump, nozzle, status) {
  localStorage.setItem(`${pump}-${nozzle}`, status);
  render();
}

function saveReason(pump, nozzle, reason) {
  localStorage.setItem(`${pump}-${nozzle}-reason`, reason);
}

render();
setInterval(render, 5000);
</script>

</body>
</html>
