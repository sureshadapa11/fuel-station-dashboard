<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capelgate Fuel Station Dashboard</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e0eafc, #cfdef3);
    margin: 0;
    color: #344056;
    min-height: 100vh;
  }

  .header {
    background: #3b82f6; /* soft blue */
    color: white;
    text-align: center;
    padding: 24px 20px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1.2px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
    user-select: none;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: minmax(350px, auto);
    gap: 28px 30px;
    padding: 30px 40px 50px;
    max-width: 960px;
    margin: 0 auto 40px;
  }

  .card {
    background: #ffffffcc; /* semi-transparent white */
    padding: 24px 28px;
    border-radius: 18px;
    box-shadow: 0 12px 25px rgb(0 0 0 / 0.08);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    box-shadow: 0 18px 35px rgb(59 130 246 / 0.25);
    transform: translateY(-6px);
    background: #f0f8ff;
  }

  .pump-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 18px;
    color: #1e40af; /* deeper blue */
    border-bottom: 3px solid #3b82f6;
    padding-bottom: 8px;
  }

  .nozzle {
    margin-bottom: 18px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  select, input {
    margin-top: 8px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.8px solid #cbd5e1;
    font-size: 16px;
    font-weight: 500;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    outline: none;
  }
  select:hover, input:hover,
  select:focus, input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 8px #3b82f6aa;
  }

  .status {
    margin-top: 10px;
    padding: 8px 0;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    user-select: none;
  }

  /* Lighter green */
  .green {
    background: #91d5a5;
    color: #164d16;
  }
  .orange {
    background: #f6ad55;
    color: #5a3e0e;
  }
  .red {
    background: #f56565;
    color: white;
  }

  .reason-box {
    display: none;
    margin-top: 10px;
    border-radius: 10px;
    border: 1.6px solid #d1d5db;
    padding: 10px 14px;
    font-size: 14px;
    font-style: italic;
    resize: vertical;
  }

  .save-btn {
    display: block;
    margin: 0 auto 48px;
    background: #3b82f6;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 20px;
    font-weight: 700;
    padding: 18px 38px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgb(59 130 246 / 0.3);
    transition: background-color 0.25s ease;
    user-select: none;
  }
  .save-btn:hover {
    background-color: #2563eb;
  }

  /* New styles for downtime report */
  #downtimeReport {
    max-width: 960px;
    margin: 0 auto 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffffcc;
    border-radius: 18px;
    padding: 24px 28px;
    box-shadow: 0 12px 25px rgb(0 0 0 / 0.08);
  }
  #downtimeReport h2 {
    color: #1e40af;
    border-bottom: 3px solid #3b82f6;
    padding-bottom: 8px;
  }
  #nozzleDowntimeList table {
    width: 100%;
    border-collapse: collapse;
  }
  #nozzleDowntimeList th, #nozzleDowntimeList td {
    padding: 8px;
    border-bottom: 1px solid #cbd5e1;
  }
  #nozzleDowntimeList th {
    text-align: left;
    border-bottom: 2px solid #3b82f6;
  }
  #nozzleDowntimeList td:last-child {
    text-align: right;
  }

  #worstPump {
    text-align: center;
    font-weight: 800;
    margin: 20px 0 40px;
    font-size: 22px;
    color: #d14343;
    user-select: none;
  }

  /* Smaller back button */
  #backBtn {
    display: block;
    margin: 0 auto 40px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 24px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgb(59 130 246 / 0.3);
    transition: background-color 0.25s ease;
    user-select: none;
  }
  #backBtn:hover {
    background-color: #2563eb;
  }
</style>
</head>
<body>

<div class="header">Fuel Station Dashboard</div>

<div id="dashboardPage">
  <div class="container" id="dashboard"></div>
  <button class="save-btn" onclick="saveData()">SAVE STATUS</button>
  <button class="save-btn" onclick="showDowntimeReport()" style="background:#3b82f6; margin-top:10px;">DOWNTIME REPORT</button>
</div>

<div id="reportPage" style="display:none;">
  <div id="downtimeReport">
    <h2>Downtime Report for Each Nozzle (Last 7 Days)</h2>
    <div id="nozzleDowntimeList">Loading nozzle downtime...</div>
  </div>

  <div id="worstPump">Loading worst pump of the week...</div>

  <button id="backBtn" onclick="showDashboard()">BACK TO DASHBOARD</button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const pumps = [
  ["Pump 1","Unleaded","Extra Unleaded","Diesel"],
  ["Pump 2","Unleaded","Extra Unleaded","Diesel"],
  ["Pump 3","Unleaded","Extra Diesel","Diesel"],
  ["Pump 4","Unleaded","Extra Diesel","Diesel"],
  ["Pump 5","Unleaded","Extra Unleaded","Diesel"],
  ["Pump 6","Unleaded","Extra Unleaded","Diesel"],
  ["Pump 7","Unleaded","Extra Diesel","Diesel"],
  ["Pump 8","Unleaded","Extra Diesel","Diesel"]
]

const container=document.getElementById("dashboard")

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB1KE8JY3ezd1E24nMHfi4vY__fcGHa7A0",
  authDomain: "fuel-station-dashboard-2ab64.firebaseapp.com",
  databaseURL: "https://fuel-station-dashboard-2ab64-default-rtdb.firebaseio.com",
  projectId: "fuel-station-dashboard-2ab64",
  storageBucket: "fuel-station-dashboard-2ab64.firebasestorage.app",
  messagingSenderId: "61242548558",
  appId: "1:61242548558:web:99f27e640ee5690a95be1f",
  measurementId: "G-WFYTNFNLRM"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Load data from Firebase or default
async function getStatusData(id) {
  const snapshot = await db.ref('status/' + id).get();
  if (snapshot.exists()) {
    return snapshot.val();
  }
  return { status: "Working", reason: "", downtimePeriods: [] };
}

async function render(){
  container.innerHTML="";

  for(let pIndex=0; pIndex<pumps.length; pIndex++){
    let pump = pumps[pIndex];
    let card=document.createElement("div");
    card.className="card";

    let html=`<div class="pump-title">${pump[0]}</div>`;

    for(let nIndex=1; nIndex<pump.length; nIndex++){
      let nozzle = pump[nIndex];
      let id = pIndex + "-" + (nIndex-1);

      let savedData = await getStatusData(id);
      let savedStatus = savedData.status || "Working";
      let savedReason = savedData.reason || "";

      let color="green";
      if(savedStatus=="Not Working") color="orange";
      if(savedStatus=="Maintenance") color="red";

      let showReason=(savedStatus!="Working") ? "block" : "none";

      html+=`
      <div class="nozzle">
      <b>${nozzle}</b>
      <select onchange="statusChanged('${id}',this.value)">
        <option ${savedStatus=="Working"?"selected":""}>Working</option>
        <option ${savedStatus=="Not Working"?"selected":""}>Not Working</option>
        <option ${savedStatus=="Maintenance"?"selected":""}>Maintenance</option>
      </select>
      <input class="reason-box" id="reason-${id}" style="display:${showReason}" placeholder="Reason" value="${savedReason}">
      <div class="status ${color}">${savedStatus}</div>
      </div>`;
    }
    card.innerHTML=html;
    container.appendChild(card);
  }
}

function statusChanged(id,value){
  let reason=document.getElementById("reason-"+id);
  if(value=="Working"){
      reason.style.display="none";
  } else {
      reason.style.display="block";
  }
  let nozzleDiv = reason.parentElement;
  let statusDiv = nozzleDiv.querySelector(".status");
  statusDiv.innerText = value;
  let color = "green";
  if(value === "Not Working") color = "orange";
  if(value === "Maintenance") color = "red";
  statusDiv.className = "status "+color;
}

async function saveData(){
  for (let pIndex = 0; pIndex < pumps.length; pIndex++) {
    for (let nIndex = 0; nIndex < pumps[pIndex].length - 1; nIndex++) {
      let id = pIndex + "-" + nIndex;
      let selectElem = document.querySelector(`select[onchange*="${id}"]`);
      let status = selectElem.value;
      let reasonInput = document.getElementById("reason-" + id);
      let reason = reasonInput.value;

      const statusRef = db.ref('status/' + id);
      const snapshot = await statusRef.get();
      const currentData = snapshot.exists() ? snapshot.val() : { status: "Working", downtimePeriods: [] };
      const prevStatus = currentData.status || "Working";
      let downtimePeriods = currentData.downtimePeriods || [];

      const now = Date.now();

      if (prevStatus === "Working" && status !== "Working") {
        downtimePeriods.push({ start: now, end: 0 });
      }
      else if (prevStatus !== "Working" && status === "Working") {
        for (let period of downtimePeriods) {
          if (period.end === 0) {
            period.end = now;
            break;
          }
        }
      }

      await statusRef.set({
        status,
        reason,
        downtimePeriods
      });
    }
  }
  alert("Changes saved successfully!");
  calculateWeeklyDowntime();
}

function setupRealtimeUpdates(){
  db.ref('status').on('value', (snapshot) => {
    if (!snapshot.exists()) return;
    const statuses = snapshot.val();

    for(const id in statuses){
      const data = statuses[id];
      const reasonInput = document.getElementById("reason-" + id);
      if(!reasonInput) continue;

      const nozzleDiv = reasonInput.parentElement;
      const statusDiv = nozzleDiv.querySelector(".status");
      const select = nozzleDiv.querySelector("select");

      if(document.activeElement !== reasonInput){
        reasonInput.value = data.reason || "";
      }

      if(document.activeElement !== select){
        select.value = data.status || "Working";
      }

      let color = "green";
      if(data.status === "Not Working") color = "orange";
      if(data.status === "Maintenance") color = "red";

      statusDiv.innerText = data.status;
      statusDiv.className = "status "+color;

      reasonInput.style.display = (data.status === "Working") ? "none" : "block";
    }
    calculateWeeklyDowntime();
  });
}

async function calculateWeeklyDowntime(){
  const oneWeekAgo = Date.now() - 7*24*3600*1000;

  const snapshot = await db.ref('status').get();
  if (!snapshot.exists()) {
    document.getElementById("worstPump").innerText = "No status data available.";
    document.getElementById("nozzleDowntimeList").innerText = "";
    return;
  }
  const statuses = snapshot.val();

  let pumpDowntime = Array(pumps.length).fill(0);

  for (const id in statuses) {
    let [pIndex, nIndex] = id.split("-").map(Number);
    let nozzleData = statuses[id];
    let downtimePeriods = nozzleData.downtimePeriods || [];

    for (let period of downtimePeriods) {
      let start = period.start || 0;
      let end = period.end === 0 ? Date.now() : period.end;

      if (end < oneWeekAgo) continue;

      let periodStart = start < oneWeekAgo ? oneWeekAgo : start;
      let periodEnd = end;

      if (periodEnd > periodStart) {
        pumpDowntime[pIndex] += periodEnd - periodStart;
      }
    }
  }

  let worstPumpIndex = pumpDowntime.indexOf(Math.max(...pumpDowntime));

  function msToHours(ms){
    return (ms / 3600000).toFixed(2);
  }

  const worstPumpText = `Worst pump of the week: ${pumps[worstPumpIndex][0]} | Total downtime: ${msToHours(pumpDowntime[worstPumpIndex])} hours`;
  document.getElementById("worstPump").innerText = worstPumpText;

  await calculateNozzleDowntime();
}

async function calculateNozzleDowntime() {
  const oneWeekAgo = Date.now() - 7*24*3600*1000;
  const snapshot = await db.ref('status').get();
  if (!snapshot.exists()) {
    document.getElementById("nozzleDowntimeList").innerText = "No status data available.";
    return;
  }
  const statuses = snapshot.val();

  let nozzleReports = [];

  for (const id in statuses) {
    let [pIndex, nIndex] = id.split("-").map(Number);
    let nozzleName = pumps[pIndex][nIndex+1];
    let downtimePeriods = statuses[id].downtimePeriods || [];
    let totalDowntime = 0;

    for (let period of downtimePeriods) {
      let start = period.start || 0;
      let end = period.end === 0 ? Date.now() : period.end;

      if (end < oneWeekAgo) continue;

      let periodStart = start < oneWeekAgo ? oneWeekAgo : start;
      let periodEnd = end;

      if (periodEnd > periodStart) {
        totalDowntime += periodEnd - periodStart;
      }
    }

    nozzleReports.push({pump: pumps[pIndex][0], nozzle: nozzleName, downtimeMs: totalDowntime});
  }

  nozzleReports.sort((a,b) => b.downtimeMs - a.downtimeMs);

  let html = `<table>
                <thead>
                  <tr><th>Pump</th>
                      <th>Nozzle</th>
                      <th>Downtime (hours)</th>
                  </tr>
                </thead>
                <tbody>`;

  function msToHours(ms) {
    return (ms / 3600000).toFixed(2);
  }
  
  for (const report of nozzleReports) {
    html += `<tr>
      <td>${report.pump}</td>
      <td>${report.nozzle}</td>
      <td>${msToHours(report.downtimeMs)}</td>
    </tr>`;
  }
  html += `</tbody></table>`;

  document.getElementById("nozzleDowntimeList").innerHTML = html;
}

function showDowntimeReport() {
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('reportPage').style.display = 'block';
  calculateWeeklyDowntime();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showDashboard() {
  document.getElementById('reportPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

render().then(() => {
  setupRealtimeUpdates();
  calculateWeeklyDowntime();
});
</script>

</body>
</html>
